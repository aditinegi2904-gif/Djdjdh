<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoboMind AI — Robotics Chatbot</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    body { overflow: hidden; }
    .chat-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: var(--nav-h);
    }
    .chat-header {
      padding: 1rem 1.5rem;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-info { display: flex; align-items: center; gap: 0.75rem; }
    .chat-avatar {
      width: 42px; height: 42px;
      background: radial-gradient(circle, rgba(0,245,255,0.2), transparent);
      border: 1px solid var(--cyan);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      position: relative;
    }
    .chat-avatar::after {
      content: '';
      position: absolute;
      bottom: 2px; right: 2px;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
    }
    .chat-name { font-family: var(--font-display); font-size: 0.9rem; color: var(--text-primary); }
    .chat-subtitle { font-family: var(--font-code); font-size: 0.7rem; color: var(--green); }
    .clear-btn {
      font-family: var(--font-code);
      font-size: 0.72rem;
      padding: 0.35rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }
    .clear-btn:hover { border-color: var(--pink); color: var(--pink); }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 80%;
      animation: msgIn 0.3s ease;
    }
    @keyframes msgIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .msg.user   { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot    { align-self: flex-start; }

    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .msg.bot  .msg-avatar { background: rgba(0,245,255,0.1); border: 1px solid var(--border); }
    .msg.user .msg-avatar { background: rgba(0,245,255,0.15); border: 1px solid rgba(0,245,255,0.3); }

    .msg-bubble {
      padding: 0.85rem 1.1rem;
      border-radius: 12px;
      font-size: 0.93rem;
      line-height: 1.65;
    }
    .msg.bot  .msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }
    .msg.user .msg-bubble {
      background: rgba(0,245,255,0.12);
      border: 1px solid rgba(0,245,255,0.25);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }
    .msg-bubble code {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.82rem;
      color: var(--cyan);
    }
    .msg-bubble pre {
      background: #020408;
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
      font-size: 0.8rem;
      color: #a8d8ea;
      line-height: 1.6;
    }
    .msg-time {
      font-family: var(--font-code);
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
      padding: 0 0.2rem;
    }
    .msg.user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 0.35rem; padding: 0.85rem 1.1rem; }
    .typing span {
      width: 7px; height: 7px;
      background: var(--cyan);
      border-radius: 50%;
      animation: typing-dot 1.2s ease infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-dot { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

    /* Suggestions */
    .suggestions {
      padding: 0.75rem 1.5rem 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .suggestion-chip {
      font-family: var(--font-code);
      font-size: 0.72rem;
      padding: 0.35rem 0.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .suggestion-chip:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,245,255,0.05); }

    /* Input bar */
    .chat-input-wrap {
      padding: 1rem 1.5rem;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-bar {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      transition: border-color var(--transition);
    }
    .chat-input-bar:focus-within { border-color: var(--cyan); }
    #chatInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #chatInput::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 38px; height: 38px;
      background: var(--cyan);
      color: var(--bg-base);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .send-btn:hover:not(:disabled) { background: #fff; box-shadow: var(--glow-cyan); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }

    @media (max-width: 768px) {
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="nav-logo" style="text-decoration:none">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">RoboMind<span class="logo-ai">AI</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="learn.html">Learn</a></li>
      <li><a href="generator.html">AI Generator</a></li>
      <li><a href="chatbot.html" class="active">Chatbot</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <div class="nav-actions">
      <span class="user-status" id="userStatus"></span>
      <a href="auth.html" class="btn-login" id="authBtn">Login</a>
      <button class="hamburger" id="hamburger">☰</button>
    </div>
  </nav>

  <div class="chat-layout">
    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-avatar">🤖</div>
        <div>
          <div class="chat-name">RoboBot</div>
          <div class="chat-subtitle">● Online — Robotics Expert AI</div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick suggestions -->
    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="sendSuggestion('How does an HC-SR04 ultrasonic sensor work?')">HC-SR04 ultrasonic sensor</button>
      <button class="suggestion-chip" onclick="sendSuggestion('What is PWM and how is it used in motor control?')">PWM for motors</button>
      <button class="suggestion-chip" onclick="sendSuggestion('Explain I2C protocol for beginners')">I2C protocol</button>
      <button class="suggestion-chip" onclick="sendSuggestion('What is the difference between Arduino Uno and ESP32?')">Arduino vs ESP32</button>
      <button class="suggestion-chip" onclick="sendSuggestion('How do servo motors work?')">Servo motors</button>
    </div>

    <!-- Input bar -->
    <div class="chat-input-wrap">
      <div class="chat-input-bar">
        <textarea id="chatInput" rows="1"
          placeholder="Ask anything about robotics, Arduino, sensors, circuits..."
          onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp }
           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG, callOpenAI, showToast } from '../js/config.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let chatHistory = []; // OpenAI message history

    const SYSTEM_PROMPT = `You are RoboBot, an expert robotics and electronics AI assistant for the RoboMind AI platform. 
You specialize in: Arduino programming, embedded systems, sensors (ultrasonic, IR, temperature, etc.), 
motors (DC, servo, stepper), IoT, circuit design, robotics projects, and electronics troubleshooting.
Be clear, practical, and beginner-friendly. Use code blocks for code examples.
Keep responses concise but complete. Use bullet points for lists of steps or components.`;

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('userStatus').textContent = user.displayName || user.email.split('@')[0];
        document.getElementById('authBtn').textContent = 'Dashboard';
        document.getElementById('authBtn').href = 'dashboard.html';
        loadChatHistory(user.uid);
      }
    });

    // ── Show welcome message ───────────────────────────────────
    function showWelcome() {
      appendMessage('bot', "👋 Hey there! I'm **RoboBot**, your AI robotics assistant.\n\nAsk me anything about:\n• Arduino programming & circuit design\n• Sensors, motors, and actuators\n• Robotics projects and debugging\n• IoT and wireless communication\n\nWhat are you building today? 🤖");
    }
    showWelcome();

    // ── Append a message to the chat ──────────────────────────
    function appendMessage(role, text, save = false) {
      const msgs = document.getElementById('chatMessages');

      // Hide suggestions after first user message
      if (role === 'user') {
        document.getElementById('suggestions').style.display = 'none';
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'msg ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'bot' ? '🤖' : '👤';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = renderMarkdown(text);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const col = document.createElement('div');
      col.appendChild(bubble);
      col.appendChild(time);

      wrapper.appendChild(avatar);
      wrapper.appendChild(col);
      msgs.appendChild(wrapper);
      msgs.scrollTop = msgs.scrollHeight;

      return wrapper;
    }

    // ── Simple markdown renderer ──────────────────────────────
    function renderMarkdown(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/^• (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '<br/><br/>')
        .replace(/\n/g, '<br/>');
    }

    // ── Typing indicator ──────────────────────────────────────
    function showTyping() {
      const msgs = document.getElementById('chatMessages');
      const el = document.createElement('div');
      el.className = 'msg bot';
      el.id = 'typingIndicator';
      el.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble">
          <div class="typing">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      msgs.appendChild(el);
      msgs.scrollTop = msgs.scrollHeight;
    }
    function hideTyping() {
      document.getElementById('typingIndicator')?.remove();
    }

    // ── Send a message ────────────────────────────────────────
    window.sendMessage = async () => {
      const input = document.getElementById('chatInput');
      const text  = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';

      appendMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      showTyping();

      try {
        const messages = [
          { role: 'system', content: SYSTEM_PROMPT },
          ...chatHistory.slice(-20) // Keep last 20 messages for context
        ];

        const reply = await callOpenAI(messages);
        hideTyping();
        appendMessage('bot', reply);
        chatHistory.push({ role: 'assistant', content: reply });

        // Save to Firestore if user is logged in
        if (currentUser) {
          saveChatMessage(currentUser.uid, text, reply);
        }

      } catch (err) {
        hideTyping();
        appendMessage('bot', `Sorry, I encountered an error: ${err.message}. Please check your API key configuration.`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    };

    window.sendSuggestion = (text) => {
      document.getElementById('chatInput').value = text;
      sendMessage();
    };

    window.handleKey = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
      // Auto-resize textarea
      const ta = document.getElementById('chatInput');
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    };

    window.clearChat = () => {
      document.getElementById('chatMessages').innerHTML = '';
      document.getElementById('suggestions').style.display = 'flex';
      chatHistory = [];
      showWelcome();
    };

    // ── Save chat to Firestore ────────────────────────────────
    async function saveChatMessage(uid, userMsg, botReply) {
      try {
        await addDoc(collection(db, 'chatHistory'), {
          uid,
          userMessage: userMsg,
          botReply,
          createdAt: serverTimestamp()
        });
      } catch (e) { /* silent fail */ }
    }

    // ── Load recent chat history ──────────────────────────────
    async function loadChatHistory(uid) {
      try {
        const q = query(
          collection(db, 'chatHistory'),
          where('uid', '==', uid),
          orderBy('createdAt', 'desc')
        );
        // We just initialize fresh - history loaded into chatHistory array
        // Could show "load previous chat" button here
      } catch (e) { /* silent */ }
    }

    // ── Hamburger ─────────────────────────────────────────────
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
