    .page-hero {
      text-align: center;

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: all var(--transition);
    }
    .project-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-5px);
      box-shadow: 0 20px 50px rgba(0,245,255,0.1);
    }

      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      position: relative;
    }
    .project-difficulty {
      position: absolute;
      top: 1rem; right: 1rem;
      font-family: var(--font-code);
      font-size: 0.68rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      letter-spacing: 1px;

      font-family: var(--font-code);
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;

      font-size: 0.72rem;

      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      text-decoration: none;
      border: none;

      color: var(--text-secondary);
      border: 1px solid var(--border);

    .proj-btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }

<h3>Project Overview</h3>
<p>Build a robot car that automatically avoids obstacles by measuring distance with an HC-SR04 ultrasonic sensor and steering away using DC motors controlled by an L298N driver.</p>
<h3>Components</h3>
<ul><li>Arduino Uno</li><li>HC-SR04 Ultrasonic Sensor</li><li>L298N Motor Driver Module</li><li>2× DC Gear Motors + Robot Chassis</li><li>9V Battery + Holder</li><li>Jumper Wires</li></ul>
<h3>Wiring Summary</h3>
<ul>
<li>HC-SR04: VCC→5V, GND→GND, TRIG→pin9, ECHO→pin10</li>
<li>L298N: IN1→pin2, IN2→pin3, IN3→pin4, IN4→pin5, ENA→pin6, ENB→pin7</li>
<li>L298N: 12V→battery+, GND→battery-, 5V→Arduino Vin</li>
</ul>
<h3>Core Arduino Code</h3>
<pre>#define TRIG 9
#define ECHO 10
#define IN1 2
#define IN2 3
#define IN3 4
#define IN4 5
#define ENA 6
#define ENB 7
#define THRESHOLD 20  // cm

void setup() {
  pinMode(TRIG,OUTPUT); pinMode(ECHO,INPUT);
  pinMode(IN1,OUTPUT); pinMode(IN2,OUTPUT);
  pinMode(IN3,OUTPUT); pinMode(IN4,OUTPUT);
  pinMode(ENA,OUTPUT); pinMode(ENB,OUTPUT);
}

float getDistance() {
  digitalWrite(TRIG,LOW); delayMicroseconds(2);
  digitalWrite(TRIG,HIGH); delayMicroseconds(10);
  digitalWrite(TRIG,LOW);
  return pulseIn(ECHO,HIGH)*0.034/2;
}

void forward()  { analogWrite(ENA,180); analogWrite(ENB,180); digitalWrite(IN1,HIGH); digitalWrite(IN2,LOW); digitalWrite(IN3,HIGH); digitalWrite(IN4,LOW); }
void backward() { analogWrite(ENA,150); analogWrite(ENB,150); digitalWrite(IN1,LOW); digitalWrite(IN2,HIGH); digitalWrite(IN3,LOW); digitalWrite(IN4,HIGH); }
void turnRight(){ analogWrite(ENA,180); analogWrite(ENB,180); digitalWrite(IN1,HIGH); digitalWrite(IN2,LOW); digitalWrite(IN3,LOW); digitalWrite(IN4,HIGH); }
void stopAll()  { digitalWrite(IN1,LOW); digitalWrite(IN2,LOW); digitalWrite(IN3,LOW); digitalWrite(IN4,LOW); }

void loop() {
  float dist = getDistance();
  if (dist < THRESHOLD) {
    stopAll(); delay(300);
    backward(); delay(400);
    turnRight(); delay(500);
  } else {
    forward();
  }
  delay(50);
}</pre>
<h3>Tips for Success</h3>
<ul>
<li>Mount ultrasonic sensor at the front, facing forward at ~15–20cm height</li>
<li>Adjust THRESHOLD (20cm) based on your robot's speed</li>
<li>Add a servo + sensor for look-left/right before deciding which way to turn</li>
</ul>`

<h3>Project Overview</h3>
<p>Build a robot that follows a black line on a white surface using 3 infrared sensors. The robot continuously reads sensor values and adjusts motor speeds to stay on the line.</p>
<h3>Sensor Layout</h3>
<p>Mount 3 IR sensors at the front of the robot, spaced 1.5–2cm apart: Left (L), Center (C), Right (R). Position them 3–5mm above the surface.</p>
<h3>Line Following Logic</h3>
<pre>// Pins: IR Left=2, Center=3, Right=4
// Motor: IN1=5,IN2=6,IN3=7,IN4=8, ENA=9,ENB=10

void loop() {
  bool L = !digitalRead(2); // true = on line
  bool C = !digitalRead(3);
  bool R = !digitalRead(4);

  if (C && !L && !R) {
    // Straight
    setMotors(200, 200);
  } else if (L && C) {
    // Veer left — slow right motor
    setMotors(120, 200);
  } else if (R && C) {
    // Veer right — slow left motor
    setMotors(200, 120);
  } else if (L && !C && !R) {
    // Sharp left turn
    setMotors(0, 200);
  } else if (R && !C && !L) {
    // Sharp right turn
    setMotors(200, 0);
  } else {
    // Lost line — stop
    setMotors(0, 0);
  }
}</pre>
<h3>Building the Track</h3>
<ul>
<li>Use 2cm wide black electrical tape on white cardboard</li>
<li>Make smooth curves (radius ≥ 15cm for best results)</li>
<li>Avoid sharp 90° corners initially</li>
<li>For competition: upgrade to PID control for faster, smoother following</li>
</ul>`

<p>Create a robot car you can drive remotely from your Android phone using a Bluetooth terminal app. The HC-05 module receives character commands (F/B/L/R/S) over Bluetooth serial.</p>
<h3>Android App</h3>
<p>Use "Arduino Bluetooth Controller" from Play Store, or any Bluetooth terminal app. Configure buttons to send: F=Forward, B=Backward, L=Left, R=Right, S=Stop.</p>
<h3>HC-05 Wiring</h3>
<ul>
<li>VCC→5V, GND→GND</li>
<li>TXD→Arduino pin 10 (via SoftwareSerial)</li>
<li>RXD→Arduino pin 11 via voltage divider (1kΩ + 2kΩ)</li>

<h3>Arduino Code</h3>
<pre>#include &lt;SoftwareSerial.h&gt;
SoftwareSerial BT(10, 11); // RX, TX

  BT.begin(9600);
  // init motor pins...

void loop() {

    }
  }

<ul>
<li>Default PIN: 1234 or 0000</li>
<li>Pair in Android Bluetooth settings first, then open app</li>
<li>LED blinks fast when unconnected, slow when paired</li>

        content: `
<h3>Project Overview</h3>
<p>Construct a 4-degree-of-freedom robotic arm with base rotation, shoulder, elbow, and gripper joints. Each joint is controlled by a potentiometer for intuitive manual control.</p>
<h3>Joint Mapping</h3>
<ul>
<li>Servo 1 (pin 2) — Base rotation (0°–180°)</li>
<li>Servo 2 (pin 3) — Shoulder (30°–150°)</li>
<li>Servo 3 (pin 4) — Elbow (0°–180°)</li>
<li>Servo 4 (pin 5) — Gripper (0°–60°)</li>

<h3>Control Code</h3>
<pre>#include &lt;Servo.h&gt;

  elbow.attach(4);    gripper.attach(5);
