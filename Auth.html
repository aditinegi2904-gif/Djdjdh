<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoboMind AI — Login / Sign Up</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 2rem) 1rem 4rem;
      position: relative;
    }
    .auth-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(0,245,255,0.08);
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      border-radius: 2px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo .logo-text {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
    }
    .auth-logo .logo-icon { font-size: 1.8rem; color: var(--cyan); margin-right: 0.4rem; }
    .auth-tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.7rem;
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 1px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }
    .auth-tab.active {
      background: var(--cyan);
      color: var(--bg-base);
      font-weight: 700;
    }
    .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label {
      font-family: var(--font-code);
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .form-group input {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-group input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,245,255,0.1); }
    .form-group input::placeholder { color: var(--text-dim); }
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--cyan);
      color: var(--bg-base);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 0.5rem;
    }
    .submit-btn:hover { background: #fff; box-shadow: var(--glow-cyan); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-divider { text-align: center; color: var(--text-dim); font-size: 0.8rem; margin: 0.5rem 0; }
    .google-btn {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .google-btn:hover { border-color: var(--border-bright); background: var(--bg-surface); }
    .auth-error {
      background: rgba(255,0,128,0.1);
      border: 1px solid rgba(255,0,128,0.3);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--pink);
      font-size: 0.85rem;
      display: none;
    }
    .auth-error.show { display: block; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="nav-logo" style="text-decoration:none">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">RoboMind<span class="logo-ai">AI</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="learn.html">Learn</a></li>
      <li><a href="generator.html">AI Generator</a></li>
      <li><a href="chatbot.html">Chatbot</a></li>
    </ul>
    <div class="nav-actions">
      <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-grid"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">RoboMind<span class="logo-ai">AI</span></span>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-top:0.5rem">Your AI Robotics Learning Platform</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">LOGIN</button>
        <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">SIGN UP</button>
      </div>

      <div id="authError" class="auth-error"></div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label>EMAIL</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">LOGIN</button>
        <div class="auth-divider">— or —</div>
        <button type="button" class="google-btn" id="googleLoginBtn">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
      </form>

      <!-- Sign Up Form -->
      <form class="auth-form hidden" id="signupForm">
        <div class="form-group">
          <label>DISPLAY NAME</label>
          <input type="text" id="signupName" placeholder="RoboMaker123" required />
        </div>
        <div class="form-group">
          <label>EMAIL</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="submit-btn" id="signupBtn">CREATE ACCOUNT</button>
        <div class="auth-divider">— or —</div>
        <button type="button" class="google-btn" id="googleSignupBtn">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             GoogleAuthProvider, signInWithPopup, updateProfile, onAuthStateChanged }
           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from '../js/config.js';

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    // ── Tab switching ──────────────────────────────────────────
    window.switchTab = (tab) => {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
      hideError();
    };

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('authError').classList.remove('show');
    }
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait...' : btn.dataset.label || btn.textContent;
    }

    // ── Create Firestore user profile ─────────────────────────
    async function createUserProfile(user, extraData = {}) {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid:          user.uid,
          email:        user.email,
          displayName:  user.displayName || extraData.displayName || 'RoboMaker',
          createdAt:    serverTimestamp(),
          savedCodes:   [],
          progress:     {},
          ...extraData
        });
      }
    }

    // ── Login ──────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      document.getElementById('loginBtn').textContent = 'Logging in...';
      document.getElementById('loginBtn').disabled = true;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(friendlyError(err.code));
        document.getElementById('loginBtn').textContent = 'LOGIN';
        document.getElementById('loginBtn').disabled = false;
      }
    });

    // ── Sign Up ────────────────────────────────────────────────
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const name     = document.getElementById('signupName').value.trim();
      const email    = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      document.getElementById('signupBtn').textContent = 'Creating account...';
      document.getElementById('signupBtn').disabled = true;
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        await createUserProfile(cred.user, { displayName: name });
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(friendlyError(err.code));
        document.getElementById('signupBtn').textContent = 'CREATE ACCOUNT';
        document.getElementById('signupBtn').disabled = false;
      }
    });

    // ── Google Auth ────────────────────────────────────────────
    async function googleSignIn() {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        await createUserProfile(result.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(friendlyError(err.code));
      }
    }
    document.getElementById('googleLoginBtn').addEventListener('click', googleSignIn);
    document.getElementById('googleSignupBtn').addEventListener('click', googleSignIn);

    // ── Error messages ─────────────────────────────────────────
    function friendlyError(code) {
      const map = {
        'auth/user-not-found':      'No account found with this email.',
        'auth/wrong-password':       'Incorrect password.',
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/popup-closed-by-user': 'Sign-in popup was closed.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      return map[code] || 'An error occurred. Please try again.';
    }

    // ── Hamburger ──────────────────────────────────────────────
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
