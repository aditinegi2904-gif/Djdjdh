<h3>What is Arduino?</h3>
<p>Arduino is an open-source electronics platform based on easy-to-use hardware and software. It consists of a microcontroller board and a development environment for writing code. Arduino reads inputs (sensors, buttons) and turns them into outputs (LEDs, motors, displays).</p>

<h3>Key Components</h3>
<ul>
<li><strong>Microcontroller:</strong> ATmega328P (Uno) — the "brain" that runs your code</li>
<li><strong>Digital I/O Pins:</strong> 14 pins that can read/write HIGH (5V) or LOW (0V)</li>
<li><strong>Analog Input Pins:</strong> 6 pins that read voltages from 0–5V (0–1023 in code)</li>
<li><strong>Power Pins:</strong> 3.3V, 5V, GND for powering components</li>
<li><strong>USB Port:</strong> For programming and Serial communication</li>
</ul>

<h3>Your First Program — Blink LED</h3>
<pre>// Blink the built-in LED on pin 13
void setup() {
  pinMode(13, OUTPUT);  // Set pin 13 as output
}

void loop() {
  digitalWrite(13, HIGH);  // Turn LED ON
  delay(1000);             // Wait 1 second
  digitalWrite(13, LOW);   // Turn LED OFF
  delay(1000);             // Wait 1 second
}</pre>

<h3>Arduino IDE Setup</h3>
<ul>
<li>Download Arduino IDE from arduino.cc</li>
<li>Install the IDE and connect your board via USB</li>
<li>Select your board: Tools → Board → Arduino Uno</li>
<li>Select the port: Tools → Port → COM3 (Windows) or /dev/ttyUSB0 (Linux)</li>
<li>Click the Upload button (→) to flash your code</li>
</ul>

<h3>Important Functions</h3>
<ul>
<li><code>pinMode(pin, mode)</code> — Set pin as INPUT or OUTPUT</li>
<li><code>digitalWrite(pin, value)</code> — Write HIGH or LOW</li>

<li><code>analogRead(pin)</code> — Read 0–1023 from analog pin</li>
<li><code>analogWrite(pin, value)</code> — PWM output 0–255</li>
<li><code>delay(ms)</code> — Pause for milliseconds</li>
<li><code>Serial.begin(9600)</code> — Start serial communication</li>
</ul>`

<h3>How It Works</h3>
<p>The HC-SR04 sends out an ultrasonic pulse at 40kHz and measures the time it takes to return after bouncing off an object. Using the speed of sound (~343 m/s), we calculate the distance.</p>

<h3>Pin Connections</h3>
<ul>
<li><strong>VCC</strong> → 5V on Arduino</li>
<li><strong>GND</strong> → GND on Arduino</li>
<li><strong>TRIG</strong> → Digital pin 9 (send pulse)</li>
<li><strong>ECHO</strong> → Digital pin 10 (receive pulse)</li>
</ul>

<h3>Formula</h3>
<p>Distance = (Time × Speed of Sound) / 2</p>
<p>In code: <code>distance = duration * 0.034 / 2</code> (gives cm)</p>

<h3>Arduino Code</h3>
<pre>const int trigPin = 9;
const int echoPin = 10;

void setup() {
  pinMode(trigPin, OUTPUT);
  pinMode(echoPin, INPUT);
  Serial.begin(9600);
}

void loop() {
  // Send 10µs pulse
  digitalWrite(trigPin, LOW);
  delayMicroseconds(2);
  digitalWrite(trigPin, HIGH);
  delayMicroseconds(10);
  digitalWrite(trigPin, LOW);

  // Measure echo
  long duration = pulseIn(echoPin, HIGH);
  float distance = duration * 0.034 / 2;

  Serial.print("Distance: ");
  Serial.print(distance);
  Serial.println(" cm");
  delay(200);
}</pre>

<h3>Tips</h3>
<ul>
<li>Range: 2cm – 400cm, best accuracy between 2–200cm</li>
<li>Objects smaller than 3cm may not reflect reliably</li>
<li>Use a 1kΩ resistor on the ECHO pin if using 3.3V boards</li>
<li>The NewPing library simplifies HC-SR04 code</li>
</ul>`

<h3>Why a Motor Driver?</h3>
<p>Arduino pins can only supply ~40mA, but DC motors need 200mA–2A. The L298N H-bridge driver acts as an amplifier, letting Arduino control high-current motors safely.</p>

<h3>L298N Pin Guide</h3>
<ul>
<li><strong>IN1, IN2</strong> — Direction control for Motor A (HIGH/LOW combinations)</li>
<li><strong>IN3, IN4</strong> — Direction control for Motor B</li>
<li><strong>ENA</strong> — Enable/Speed control for Motor A (PWM)</li>
<li><strong>ENB</strong> — Enable/Speed control for Motor B (PWM)</li>
<li><strong>12V</strong> — Motor power supply (6–12V)</li>
<li><strong>5V</strong> — Logic power (can power Arduino if jumper on)</li>
<li><strong>GND</strong> — Common ground</li>
</ul>

<h3>Direction Truth Table (Motor A)</h3>
<ul>
<li>IN1=HIGH, IN2=LOW → Forward</li>
<li>IN1=LOW, IN2=HIGH → Backward</li>
<li>IN1=LOW, IN2=LOW → Stop (coast)</li>
<li>IN1=HIGH, IN2=HIGH → Brake</li>
</ul>

<h3>Arduino Code</h3>
<pre>// Motor A on pins 5,6,7
// Motor B on pins 8,9,10
const int ENA=5, IN1=6, IN2=7;
const int ENB=8, IN3=9, IN4=10;

void setup() {
  pinMode(ENA,OUTPUT); pinMode(IN1,OUTPUT); pinMode(IN2,OUTPUT);
  pinMode(ENB,OUTPUT); pinMode(IN3,OUTPUT); pinMode(IN4,OUTPUT);
}

void forward(int speed) {
  analogWrite(ENA, speed);  // 0-255
  analogWrite(ENB, speed);
  digitalWrite(IN1, HIGH); digitalWrite(IN2, LOW);
  digitalWrite(IN3, HIGH); digitalWrite(IN4, LOW);
}

void stopMotors() {
  digitalWrite(IN1, LOW); digitalWrite(IN2, LOW);
  digitalWrite(IN3, LOW); digitalWrite(IN4, LOW);
}

void loop() {
  forward(200);  // Move forward at ~78% speed
  delay(2000);
  stopMotors();
  delay(1000);
}</pre>`

<h3>What is a Servo Motor?</h3>
<p>A servo motor is a motor with built-in gearing and a feedback control system that allows it to rotate to a specific angle (typically 0–180°). It has 3 wires: power (red), ground (brown/black), and signal (orange/yellow/white).</p>

<h3>Wiring</h3>
<ul>
<li>Red → 5V (use external power for multiple servos)</li>
<li>Brown/Black → GND</li>
<li>Orange/Yellow → Signal pin (any PWM pin)</li>
</ul>

<h3>Using the Servo Library</h3>
<pre>#include &lt;Servo.h&gt;

Servo myServo;

void setup() {
  myServo.attach(9);  // Signal on pin 9
}

void loop() {
  // Sweep 0° to 180°
  for (int pos = 0; pos <= 180; pos++) {
    myServo.write(pos);
    delay(15);  // 15ms per degree
  }
  // Sweep back
  for (int pos = 180; pos >= 0; pos--) {
    myServo.write(pos);
    delay(15);
  }
}</pre>

<h3>Servo Types</h3>
<ul>
<li><strong>Standard (SG90, MG996R):</strong> 0°–180° rotation</li>
<li><strong>Continuous Rotation:</strong> Speed control, full 360° rotation</li>
<li><strong>Linear:</strong> Push/pull linear motion</li>
</ul>

<h3>Tips</h3>
<ul>
<li>Never power multiple servos directly from Arduino 5V pin — use external 5V supply</li>
<li>Add a 100µF capacitor across servo power lines to reduce noise</li>
<li>MG996R is metal-geared and much stronger than plastic SG90</li>
</ul>`

<h3>How IR Sensors Work</h3>
<p>An IR (Infrared) sensor emits infrared light and measures how much is reflected back. Dark surfaces absorb IR (returns LOW), white surfaces reflect IR (returns HIGH). This makes them perfect for line following.</p>

<h3>Wiring (TCRT5000 / generic IR module)</h3>
<ul>
<li>VCC → 5V</li>
<li>GND → GND</li>
<li>OUT → Digital pin (LOW when line detected, HIGH otherwise)</li>
</ul>

<h3>3-Sensor Line Follower Logic</h3>
<pre>// 3 IR sensors: Left(2), Center(3), Right(4)
const int irL=2, irC=3, irR=4;

void loop() {
  int L = digitalRead(irL);  // 0 = on line
  int C = digitalRead(irC);
  int R = digitalRead(irR);

  if (C == 0) {
    // Center on line → go straight
    forward(180);
  } else if (L == 0) {
    // Left sensor on line → turn left
    turnLeft(150);
  } else if (R == 0) {
    // Right sensor on line → turn right
    turnRight(150);
  } else {
    // No line detected → stop or search
    stopMotors();
  }
}</pre>

<h3>Calibration Tips</h3>
<ul>
<li>Adjust the potentiometer on the IR module for the best sensitivity</li>
<li>Keep sensor height 3–5mm above the surface</li>
<li>Use black electrical tape on white paper for best contrast</li>
<li>For better performance, use analog values and PID control</li>
</ul>`
